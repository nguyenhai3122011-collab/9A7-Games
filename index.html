<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9A7 Games - Thế giới trò chơi tri thức</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --bg-dark: #2d3436;
            --text-light: #dfe6e9;
            --accent-color: #00ceea;
            --danger-color: #ff7675;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); overflow-x: hidden; }
        
        h1 { text-align: center; padding: 40px 0; font-size: 3rem; text-transform: uppercase; letter-spacing: 5px; color: var(--accent-color); text-shadow: 0 0 10px rgba(0, 206, 234, 0.7); animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 10px var(--accent-color); } to { text-shadow: 0 0 30px var(--primary-color), 0 0 10px #fff; } }
        
        .search-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; padding: 0 20px; }
        #searchBox { width: 100%; max-width: 500px; padding: 12px 20px; border-radius: 25px; border: 2px solid var(--primary-color); background: rgba(255, 255, 255, 0.1); color: white; font-size: 1.1rem; outline: none; text-align: center; }

        /* Nút tìm kiếm ẩn */
        .secret-search-trigger { position: fixed; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: 1px solid var(--primary-color); color: white; padding: 10px; border-radius: 50%; cursor: pointer; z-index: 100; transition: 0.3s; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        .secret-search-trigger:hover { background: var(--primary-color); }
        #secret-panel { display: none; position: fixed; top: 75px; right: 20px; background: #3d4446; padding: 15px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); z-index: 100; border: 1px solid var(--accent-color); }
        #secretInput { padding: 8px; border-radius: 5px; border: none; outline: none; width: 180px; }

        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .game-card { background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 25px 20px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; gap: 5px; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--accent-color); background: rgba(255, 255, 255, 0.1); }
        .game-card .game-title { color: var(--accent-color); font-size: 1.6rem; font-weight: bold; margin-bottom: 5px; }
        .game-card .game-type { color: var(--secondary-color); font-size: 1.1rem; font-style: italic; }

        #game-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 1000; padding: 20px; flex-direction: column; align-items: center; justify-content: center; }
        .close-game { position: absolute; top: 20px; right: 20px; background: var(--danger-color); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; font-weight: bold; z-index: 1001; }
        .question-box { background: #fff; color: #333; padding: 30px; border-radius: 20px; width: 95%; max-width: 700px; text-align: center; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .ans-btn { display: block; width: 100%; padding: 14px; margin: 10px 0; border: 2px solid var(--primary-color); border-radius: 10px; background: #fff; cursor: pointer; font-size: 1.1rem; font-weight: 500; transition: 0.2s; }
        .ans-btn:hover:not(:disabled) { background: var(--secondary-color); color: #fff; }
        .ans-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .feedback { margin: 20px 0; font-weight: bold; font-size: 1.3rem; display: none; }
        .btn-next { background: #27ae60; color: white; border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-size: 1.1rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="lobby">
        <button class="secret-search-trigger" onclick="toggleSecretPanel()">🔍</button>
        <div id="secret-panel">
            <input type="text" id="secretInput" placeholder="Nhập ID ẩn (HIDE...)" oninput="renderLobby()">
        </div>

        <h1>9A7 Games</h1>
        <div class="search-container">
            <input type="text" id="searchBox" placeholder="Tìm kiếm game công khai..." oninput="renderLobby()">
        </div>
        <div id="gameGrid" class="game-grid"></div>
    </div>

    <div id="game-screen">
        <button class="close-game" onclick="exitGame()">✕</button>
        <div class="question-box">
            <h2 id="q-title"></h2>
            <p id="q-rules" style="margin-top:10px; color: #777; font-size: 0.9rem;"></p>
            <hr style="margin: 20px 0;">
            <div id="quiz-content"></div>
            <div id="feedback-area" class="feedback"></div>
            <div style="margin-top: 20px;">
                <button id="next-btn" class="btn-next" style="display: none;" onclick="nextQuestion()">TIẾP THEO</button>
            </div>
        </div>
    </div>

    <script>
        let gameFiles = []; 
        let currentGameData = [];
        let currentIdx = 0;
        let score = 0;
        let currentType = "";
        const typeNames = { "4Answer": "Chọn đáp án", "TFAnswer": "Đúng sai", "WAnswer": "Điền đáp án" };

        function toggleSecretPanel() {
            const panel = document.getElementById('secret-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
            if(panel.style.display === 'block') document.getElementById('secretInput').focus();
        }

        async function fetchGameList() {
            try {
                const response = await fetch('./Game_list.txt?t=' + new Date().getTime());
                const text = await response.text();
                const lines = text.split('\n').filter(l => l.trim() !== "");
                const rawGames = lines.map(line => {
                    const parts = line.split('|');
                    return { id: parts[0]?.trim() || "", type: parts[1]?.trim() || "" };
                }).filter(g => g.id !== "");

                gameFiles = await Promise.all(rawGames.map(async (game) => {
                    try {
                        const res = await fetch(`./${game.type}/${game.id}`);
                        const content = await res.text();
                        const firstLine = content.split('\n')[0].trim();
                        return { ...game, displayName: firstLine || game.id.replace('.txt','') };
                    } catch (e) { return { ...game, displayName: game.id.replace('.txt','') }; }
                }));
                renderLobby();
                checkDeepLink();
            } catch (e) { console.error(e); }
        }

        function renderLobby() {
            const grid = document.getElementById('gameGrid');
            const searchMain = document.getElementById('searchBox').value.trim().toLowerCase();
            const searchSecret = document.getElementById('secretInput').value.trim().toLowerCase();
            grid.innerHTML = "";

            const isEightDigits = /^\d{8}$/.test(searchMain);

            for (let i = gameFiles.length - 1; i >= 0; i--) {
                const game = gameFiles[i];
                const rawId = game.id.replace('.txt','');
                const isHide = rawId.toLowerCase().includes("hide");

                let shouldShow = false;

                // 1. Ô tìm kiếm chính: 
                // - Không bao giờ hiện game HIDE.
                // - Nếu nhập đúng 8 số: Phải khớp ID.
                // - Nếu nhập chuỗi bình thường: Tìm theo Tên Game (displayName).
                if (!isHide && searchMain !== "") {
                    if (isEightDigits) {
                        if (rawId === searchMain) shouldShow = true;
                    } else {
                        if (game.displayName.toLowerCase().includes(searchMain)) shouldShow = true;
                    }
                }

                // 2. Ô tìm kiếm bí mật: Chỉ tìm các game có tag HIDE
                if (isHide && searchSecret !== "" && rawId.toLowerCase().includes(searchSecret)) {
                    shouldShow = true;
                }

                // Nếu không nhập gì, mặc định ẩn tất cả để sảnh gọn gàng
                if (shouldShow) {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `<div class="game-title">${game.displayName}</div><div class="game-id">ID: ${rawId}</div><div class="game-type">${typeNames[game.type] || game.type}</div>`;
                    card.onclick = () => { window.location.hash = "ID" + rawId; loadGame(game.type, game.id); };
                    grid.appendChild(card);
                }
            }
        }

        async function loadGame(type, filename) {
            try {
                const response = await fetch(`./${type}/${filename}?t=` + new Date().getTime());
                const text = await response.text();
                const lines = text.split('\n').map(l => l.trim()).filter(l => l !== "");
                document.getElementById('q-title').innerText = lines[0];
                document.getElementById('q-rules').innerText = "Luật chơi: " + lines[1];
                currentType = type;
                currentGameData = lines.slice(2).map(line => line.split('|').map(item => item.trim()));
                currentIdx = 0; score = 0;
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('game-screen').style.display = 'flex';
                showQuestion();
            } catch (e) { alert("Lỗi tải file!"); exitGame(); }
        }

        function showQuestion() {
            const content = document.getElementById('quiz-content');
            const feedback = document.getElementById('feedback-area');
            const nextBtn = document.getElementById('next-btn');
            feedback.style.display = 'none'; nextBtn.style.display = 'none';
            content.innerHTML = "";
            if (currentIdx >= currentGameData.length) { endGame(); return; }
            const data = currentGameData[currentIdx];

            if (currentType === "4Answer") {
                content.innerHTML = `<h3 style="margin-bottom:15px;">${data[0]}</h3>`;
                for (let i = 1; i <= 4; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'ans-btn'; btn.innerText = data[i];
                    btn.onclick = () => checkAnswer(i.toString(), data[5], data);
                    content.appendChild(btn);
                }
            } else if (currentType === "WAnswer") {
                content.innerHTML = `<h3>${data[0]}</h3><input type="text" id="w-input" placeholder="Nhập đáp án..." autocomplete="off"><button class="ans-btn" style="background:var(--primary-color); color:white;" onclick="checkAnswer(document.getElementById('w-input').value, '${data[1]}', null)">KIỂM TRA</button>`;
                setTimeout(() => document.getElementById('w-input').focus(), 100);
            } else if (currentType === "TFAnswer") {
                content.innerHTML = `<h3>${data[0]}</h3><div style="margin-top:15px; display:flex; gap:10px;"><button class="ans-btn" onclick="checkAnswer('T', '${data[1]}', null)">ĐÚNG</button><button class="ans-btn" onclick="checkAnswer('F', '${data[1]}', null)">SAI</button></div>`;
            }
        }

        function checkAnswer(userAns, correctAnsRaw, fullData) {
            const feedback = document.getElementById('feedback-area');
            const nextBtn = document.getElementById('next-btn');
            const buttons = document.querySelectorAll('.ans-btn');
            buttons.forEach(btn => btn.disabled = true);
            if(document.getElementById('w-input')) document.getElementById('w-input').disabled = true;

            const u = userAns.toString().trim().toUpperCase();
            const c = correctAnsRaw.toString().trim().toUpperCase();
            feedback.style.display = "block"; nextBtn.style.display = "inline-block";

            if (u === c) {
                score++; feedback.innerHTML = "✅ CHÍNH XÁC!"; feedback.style.color = "#27ae60";
            } else {
                let txt = correctAnsRaw;
                if (currentType === "4Answer") txt = fullData[parseInt(correctAnsRaw)];
                if (currentType === "TFAnswer") txt = (c === 'T') ? "ĐÚNG" : "SAI";
                feedback.innerHTML = `❌ SAI RỒI!<br><span style="font-size:1rem; font-weight:normal; color:#333;">Đáp án đúng là: <b>${txt}</b></span>`;
                feedback.style.color = "#e74c3c";
            }
        }

        function nextQuestion() { currentIdx++; showQuestion(); }
        function exitGame() { if (confirm("Bạn có chắc muốn thoát?")) { document.getElementById('game-screen').style.display = 'none'; document.getElementById('lobby').style.display = 'block'; window.location.hash = ""; } }
        function endGame() { document.getElementById('quiz-content').innerHTML = `<h2>KẾT THÚC!</h2><div style="font-size: 3.5rem; margin: 20px 0; color:var(--primary-color)">${score}/${currentGameData.length}</div><button class="btn-next" onclick="location.reload()">VỀ SẢNH</button>`; }
        function checkDeepLink() { const hash = window.location.hash; if (hash && hash.startsWith("#ID")) { const targetId = hash.substring(3); const game = gameFiles.find(g => g.id.replace('.txt','') === targetId); if (game) loadGame(game.type, game.id); } }
        fetchGameList();
    </script>
</body>
</html>
