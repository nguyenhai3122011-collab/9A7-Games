<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9A7 Games - Thế giới trò chơi tri thức</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --bg-dark: #2d3436;
            --text-light: #dfe6e9;
            --accent-color: #00ceea;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
            transition: all 0.3s ease;
        }

        /* Hiệu ứng chữ lung linh */
        h1 {
            text-align: center;
            padding: 40px 0;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(0, 206, 234, 0.7), 0 0 20px rgba(0, 206, 234, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px var(--accent-color); }
            to { text-shadow: 0 0 30px var(--primary-color), 0 0 10px #fff; }
        }

        /* Thanh tìm kiếm */
        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        #searchBox {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 25px;
            border: 2px solid var(--primary-color);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        #searchBox:focus {
            box-shadow: 0 0 15px var(--primary-color);
            background: rgba(255, 255, 255, 0.2);
        }

        /* Danh sách Game */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.8s ease forwards;
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.05);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
        }

        .game-card h3 { margin-bottom: 10px; color: var(--secondary-color); }
        .game-card p { font-size: 0.9rem; opacity: 0.8; }

        /* Giao diện chơi game */
        #game-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 1000;
            padding: 30px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .question-box {
            background: #fff;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 700px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            animation: slideUp 0.5s ease;
        }

        .ans-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid var(--primary-color);
            border-radius: 10px;
            background: transparent;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.2s;
        }

        .ans-btn:hover { background: var(--secondary-color); color: white; }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
            border: 2px solid #ccc;
            font-size: 1.1rem;
        }

        .feedback {
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 15px;
            display: none;
        }

        .btn-next {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { transform: translateY(100vh); } to { transform: translateY(0); } }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .question-box { width: 95%; padding: 15px; }
        }
    </style>
</head>
<body>

    <div id="lobby">
        <h1>9A7 Games</h1>
        <div class="search-container">
            <input type="text" id="searchBox" placeholder="Nhập ID game để tìm kiếm..." oninput="renderLobby()">
        </div>
        <div id="gameGrid" class="game-grid"></div>
    </div>

    <div id="game-screen">
        <div class="question-box">
            <h2 id="q-title" style="margin-bottom: 5px;"></h2>
            <p id="q-rules" style="font-style: italic; margin-bottom: 20px; color: #666;"></p>
            <hr>
            <div id="quiz-content" style="margin-top: 20px;">
                <!-- Nội dung câu hỏi sẽ hiện ở đây -->
            </div>
            <div id="feedback-area" class="feedback"></div>
            <button id="next-btn" class="btn-next" style="display: none;" onclick="nextQuestion()">Tiếp tục</button>
        </div>
    </div>

    <script>
        // DANH SÁCH FILE CỦA BẠN (Bạn hãy thêm tên file vào đây)
        // Ví dụ: { id: "12345678.txt", type: "4Answer" }
        const gameFiles = [
            { id: "10000001.txt", type: "4Answer" },
            { id: "HIDE20000002.txt", type: "WAnswer" },
            { id: "30000003.txt", type: "TFAnswer" }
        ];

        let currentGameData = [];
        let currentIdx = 0;
        let score = 0;
        let currentType = "";

        // 1. Render Sảnh chờ
        async function renderLobby() {
            const grid = document.getElementById('gameGrid');
            const search = document.getElementById('searchBox').value.trim();
            grid.innerHTML = "";

            // Duyệt ngược để hiện mới nhất trước
            for (let i = gameFiles.length - 1; i >= 0; i--) {
                const game = gameFiles[i];
                const isHidden = game.id.includes("HIDE");
                
                // Nếu là HIDE, chỉ hiện khi search đúng ID (bao gồm cả chữ HIDE hoặc chỉ ID)
                if (isHidden && !game.id.includes(search) || (search === "" && isHidden)) {
                    continue;
                }
                
                if (!isHidden && search !== "" && !game.id.includes(search)) {
                    continue;
                }

                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `<h3>ID: ${game.id.replace('.txt','')}</h3><p>Thể loại: ${game.type}</p>`;
                card.onclick = () => loadGame(game.type, game.id);
                grid.appendChild(card);
            }
        }

        // 2. Tải dữ liệu Game
        async function loadGame(type, filename) {
            try {
                const response = await fetch(`./${type}/${filename}`);
                const text = await response.text();
                const lines = text.split('\n').filter(l => l.trim() !== "");
                
                const gameTitle = lines[0];
                const gameRules = lines[1];
                currentType = type;
                currentGameData = lines.slice(2).map(line => line.split('|'));
                
                currentIdx = 0;
                score = 0;

                document.getElementById('lobby').style.display = 'none';
                document.getElementById('game-screen').style.display = 'flex';
                document.getElementById('q-title').innerText = gameTitle;
                document.getElementById('q-rules').innerText = gameRules;
                
                showQuestion();
            } catch (e) {
                alert("Không thể tải file game. Hãy kiểm tra lại đường dẫn GitHub!");
            }
        }

        // 3. Hiển thị câu hỏi
        function showQuestion() {
            const content = document.getElementById('quiz-content');
            const feedback = document.getElementById('feedback-area');
            const nextBtn = document.getElementById('next-btn');
            
            feedback.style.display = 'none';
            nextBtn.style.display = 'none';
            content.innerHTML = "";

            if (currentIdx >= currentGameData.length) {
                endGame();
                return;
            }

            const data = currentGameData[currentIdx];

            if (currentType === "4Answer") {
                const qText = data[0];
                content.innerHTML = `<h3>${qText}</h3>`;
                for (let i = 1; i <= 4; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'ans-btn';
                    btn.innerText = data[i];
                    btn.onclick = () => checkAnswer(i, data[5]);
                    content.appendChild(btn);
                }
            } 
            else if (currentType === "WAnswer") {
                content.innerHTML = `<h3>${data[0]}</h3>
                    <input type="text" id="w-input" placeholder="Nhập câu trả lời...">
                    <button class="btn-next" style="display:block; margin: 20px auto;" onclick="checkWAnswer('${data[1]}')">Gửi</button>`;
            }
            else if (currentType === "TFAnswer") {
                content.innerHTML = `<h3>${data[0]}</h3>
                    <button class="ans-btn" onclick="checkAnswer('T', '${data[1]}')">ĐÚNG (True)</button>
                    <button class="ans-btn" onclick="checkAnswer('F', '${data[1]}')">SAI (False)</button>`;
            }
        }

        // 4. Kiểm tra đáp án
        function checkAnswer(userAns, corectAns) {
            const feedback = document.getElementById('feedback-area');
            const nextBtn = document.getElementById('next-btn');
            
            // Chặn bấm nhiều lần
            const buttons = document.querySelectorAll('.ans-btn');
            buttons.forEach(b => b.style.pointerEvents = 'none');

            if (userAns.toString().trim().toLowerCase() === corectAns.toString().trim().toLowerCase()) {
                score++;
                feedback.innerHTML = "✅ CHÍNH XÁC!";
                feedback.style.color = "green";
                setTimeout(nextQuestion, 1000); // Đúng thì qua luôn sau 1s
            } else {
                feedback.innerHTML = `❌ SAI RỒI! Đáp án đúng là: <b>${corectAns}</b>`;
                feedback.style.color = "red";
                nextBtn.style.display = "inline-block"; // Sai thì phải ấn Tiếp tục
            }
            feedback.style.display = "block";
        }

        function checkWAnswer(correct) {
            const val = document.getElementById('w-input').value;
            checkAnswer(val.toLowerCase(), correct.toLowerCase());
        }

        function nextQuestion() {
            currentIdx++;
            showQuestion();
        }

        function endGame() {
            const content = document.getElementById('quiz-content');
            content.innerHTML = `<h2>Trò chơi kết thúc!</h2>
                <h1 style="color:var(--primary-color)">${score}/${currentGameData.length}</h1>
                <button class="btn-next" onclick="location.reload()">Quay về sảnh</button>`;
            document.getElementById('q-title').innerText = "KẾT QUẢ";
            document.getElementById('q-rules').innerText = "";
        }

        // Khởi tạo
        renderLobby();
    </script>
</body>
</html>
