<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9A7's Game</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --bg-dark: #2d3436;
            --text-light: #dfe6e9;
            --accent-color: #00ceea;
            --danger-color: #ff7675;
            --success-color: #27ae60;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); overflow-x: hidden; }
        
        h1 { text-align: center; padding: 40px 0; font-size: 3rem; text-transform: uppercase; letter-spacing: 5px; color: var(--accent-color); text-shadow: 0 0 10px rgba(0, 206, 234, 0.7); animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 10px var(--accent-color); } to { text-shadow: 0 0 30px var(--primary-color), 0 0 10px #fff; } }
        
        .search-area { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 30px; padding: 0 20px; flex-wrap: wrap; }
        #searchBox { width: 100%; max-width: 400px; padding: 12px 20px; border-radius: 25px; border: 2px solid var(--primary-color); background: rgba(255, 255, 255, 0.1); color: white; font-size: 1.1rem; outline: none; }
        
        .btn-quick { background: var(--primary-color); color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; white-space: nowrap; }
        .btn-quick:hover { background: var(--secondary-color); transform: scale(1.05); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #3d4446; padding: 30px; border-radius: 20px; border: 2px solid var(--accent-color); text-align: center; width: 90%; max-width: 400px; position: relative; }
        #quickInput { width: 100%; padding: 15px; margin-top: 15px; border-radius: 10px; border: none; font-size: 1.5rem; text-align: center; letter-spacing: 2px; text-transform: uppercase; outline: none; }
        .modal-close { position: absolute; top: 10px; right: 15px; color: #fff; cursor: pointer; font-size: 1.5rem; }

        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .game-card { background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 25px 20px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; gap: 5px; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--accent-color); background: rgba(255, 255, 255, 0.1); }
        .game-card .game-title { color: var(--accent-color); font-size: 1.6rem; font-weight: bold; margin-bottom: 5px; }
        .game-card .game-type { color: var(--secondary-color); font-size: 1.1rem; font-style: italic; }

        #game-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 3000; padding: 20px; flex-direction: column; align-items: center; justify-content: center; }
        .close-game { position: absolute; top: 20px; right: 20px; background: var(--danger-color); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; font-weight: bold; z-index: 3001; }
        .question-box { background: #fff; color: #333; padding: 30px; border-radius: 20px; width: 95%; max-width: 700px; text-align: center; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .ans-btn { display: block; width: 100%; padding: 14px; margin: 10px 0; border: 2px solid var(--primary-color); border-radius: 10px; background: #fff; cursor: pointer; font-size: 1.1rem; font-weight: 500; transition: 0.2s; }
        .ans-btn:hover:not(:disabled) { background: var(--secondary-color); color: #fff; }
        .ans-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .feedback { margin: 20px 0; font-weight: bold; font-size: 1.3rem; display: none; }
        .btn-next { background: var(--success-color); color: white; border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-size: 1.1rem; font-weight: bold; }
        #w-input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 10px; border: 2px solid #ddd; font-size: 1.1rem; text-align: center; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1>Fun Games</h1>
        
        <div class="search-area">
            <input type="text" id="searchBox" placeholder="Tìm kiếm game công khai..." oninput="renderLobby()">
            <button class="btn-quick" onclick="openQuickPlay()">Tham gia nhanh</button>
        </div>

        <div id="gameGrid" class="game-grid"></div>
    </div>

    <div id="quickModal" class="modal-overlay" onclick="closeQuickPlay(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeQuickPlay()">&times;</span>
            <h2 style="color: var(--accent-color);">NHẬP ID</h2>
            <p style="font-size: 0.9rem; color: #ccc; margin-top: 5px;">Hệ thống sẽ tự quét cả ID ẩn</p>
            <input type="text" id="quickInput" maxlength="12" placeholder="Nhập mã số..." oninput="handleQuickInput()">
            <div id="quickStatus" style="margin-top: 15px; color: var(--danger-color); min-height: 20px;"></div>
        </div>
    </div>

    <div id="game-screen">
        <button class="close-game" onclick="exitGame()">✕</button>
        <div class="question-box">
            <h2 id="q-title"></h2>
            <p id="q-rules" style="margin-top:10px; color: #777; font-size: 0.9rem;"></p>
            <hr style="margin: 20px 0;">
            <div id="quiz-content"></div>
            <div id="feedback-area" class="feedback"></div>
            <div style="margin-top: 20px;">
                <button id="next-btn" class="btn-next" style="display: none;" onclick="nextQuestion()">TIẾP THEO</button>
            </div>
        </div>
    </div>

    <script>
        let gameFiles = []; 
        let currentGameData = [];
        let currentIdx = 0;
        let score = 0;
        let currentType = "";
        const typeNames = { "4Answer": "Chọn đáp án", "TFAnswer": "Đúng sai", "WAnswer": "Điền đáp án" };

        function openQuickPlay() {
            document.getElementById('quickModal').style.display = 'flex';
            document.getElementById('quickInput').value = "";
            document.getElementById('quickStatus').innerText = "";
            setTimeout(() => document.getElementById('quickInput').focus(), 100);
        }

        function closeQuickPlay() {
            document.getElementById('quickModal').style.display = 'none';
        }

        function handleQuickInput() {
            const val = document.getElementById('quickInput').value.trim().toLowerCase();
            const status = document.getElementById('quickStatus');
            
            if (val.length >= 8) {
                let game = gameFiles.find(g => g.id.replace('.txt','').toLowerCase() === val);
                if (!game) {
                    const hideVal = "hide" + val;
                    game = gameFiles.find(g => g.id.replace('.txt','').toLowerCase() === hideVal);
                }
                
                if (game) {
                    status.innerText = "Đang kết nối...";
                    status.style.color = "var(--success-color)";
                    setTimeout(() => {
                        closeQuickPlay();
                        loadGame(game.type, game.id);
                    }, 600);
                } else {
                    status.innerText = "Mã ID không hợp lệ!";
                    status.style.color = "var(--danger-color)";
                }
            } else {
                status.innerText = "";
            }
        }

        async function fetchGameList() {
            try {
                const response = await fetch('./Game_list.txt?t=' + new Date().getTime());
                const text = await response.text();
                const lines = text.split('\n').filter(l => l.trim() !== "");
                const rawGames = lines.map(line => {
                    const parts = line.split('|');
                    return { id: parts[0]?.trim() || "", type: parts[1]?.trim() || "" };
                }).filter(g => g.id !== "");

                gameFiles = await Promise.all(rawGames.map(async (game) => {
                    try {
                        const res = await fetch(`./${game.type}/${game.id}`);
                        const content = await res.text();
                        const firstLine = content.split('\n')[0].trim();
                        return { ...game, displayName: firstLine || game.id.replace('.txt','') };
                    } catch (e) { return { ...game, displayName: game.id.replace('.txt','') }; }
                }));
                renderLobby();
                // Kiểm tra xem URL có chứa ID sẵn không để vào luôn
                checkURLParam();
            } catch (e) { console.error("Lỗi:", e); }
        }

        function renderLobby() {
            const grid = document.getElementById('gameGrid');
            const searchMain = document.getElementById('searchBox').value.trim().toLowerCase();
            grid.innerHTML = "";

            for (let i = gameFiles.length - 1; i >= 0; i--) {
                const game = gameFiles[i];
                const rawId = game.id.replace('.txt','');
                const isHide = rawId.toLowerCase().includes("hide");

                if (!isHide) {
                    if (searchMain === "" || game.displayName.toLowerCase().includes(searchMain) || rawId.toLowerCase().includes(searchMain)) {
                        const card = document.createElement('div');
                        card.className = 'game-card';
                        card.innerHTML = `<div class="game-title">${game.displayName}</div><div class="game-id">ID: ${rawId}</div><div class="game-type">${typeNames[game.type] || game.type}</div>`;
                        card.onclick = () => loadGame(game.type, game.id);
                        grid.appendChild(card);
                    }
                }
            }
        }

        async function loadGame(type, filename) {
            try {
                const rawId = filename.replace('.txt', '');
                // Cập nhật URL thành .../ID#12345678
                window.location.hash = `ID#${rawId}`;

                const response = await fetch(`./${type}/${filename}?t=` + new Date().getTime());
                const text = await response.text();
                const lines = text.split('\n').map(l => l.trim()).filter(l => l !== "");
                document.getElementById('q-title').innerText = lines[0];
                document.getElementById('q-rules').innerText = "Luật chơi: " + lines[1];
                currentType = type;
                currentGameData = lines.slice(2).map(line => line.split('|').map(item => item.trim()));
                currentIdx = 0; score = 0;
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('game-screen').style.display = 'flex';
                showQuestion();
            } catch (e) { alert("Lỗi tải trò chơi!"); exitGame(); }
        }

        function checkURLParam() {
            const hash = window.location.hash;
            if (hash.startsWith('#ID#')) {
                const targetId = hash.replace('#ID#', '').toLowerCase();
                const game = gameFiles.find(g => g.id.replace('.txt','').toLowerCase() === targetId);
                if (game) {
                    loadGame(game.type, game.id);
                }
            }
        }

        function exitGame() {
            if (confirm("Thoát trò chơi này?")) {
                // Xóa hash trên URL khi thoát
                window.location.hash = "";
                document.getElementById('game-screen').style.display = 'none';
                document.getElementById('lobby').style.display = 'block';
            }
        }

        function showQuestion() {
            const content = document.getElementById('quiz-content');
            const feedback = document.getElementById('feedback-area');
            const nextBtn = document.getElementById('next-btn');
            feedback.style.display = 'none'; nextBtn.style.display = 'none';
            content.innerHTML = "";
            if (currentIdx >= currentGameData.length) { endGame(); return; }
            const data = currentGameData[currentIdx];

            if (currentType === "4Answer") {
                content.innerHTML = `<h3 style="margin-bottom:15px;">${data[0]}</h3>`;
                for (let i = 1; i <= 4; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'ans-btn'; btn.innerText = data[i];
                    btn.onclick = () => checkAnswer(i.toString(), data[5], data);
                    content.appendChild(btn);
                }
            } else if (currentType === "WAnswer") {
                content.innerHTML = `<h3>${data[0]}</h3><input type="text" id="w-input" placeholder="Nhập đáp án..." autocomplete="off"><button class="ans-btn" style="background:var(--primary-color); color:white;" onclick="checkAnswer(document.getElementById('w-input').value, '${data[1]}', null)">GỬI ĐÁP ÁN</button>`;
                setTimeout(() => document.getElementById('w-input').focus(), 100);
            } else if (currentType === "TFAnswer") {
                content.innerHTML = `<h3>${data[0]}</h3><div style="margin-top:15px; display:flex; gap:10px;"><button class="ans-btn" onclick="checkAnswer('T', '${data[1]}', null)">ĐÚNG</button><button class="ans-btn" onclick="checkAnswer('F', '${data[1]}', null)">SAI</button></div>`;
            }
        }

        function checkAnswer(userAns, correctAnsRaw, fullData) {
            const feedback = document.getElementById('feedback-area');
            const nextBtn = document.getElementById('next-btn');
            const buttons = document.querySelectorAll('.ans-btn');
            buttons.forEach(btn => btn.disabled = true);
            if(document.getElementById('w-input')) document.getElementById('w-input').disabled = true;

            const u = userAns.toString().trim().toUpperCase();
            const c = correctAnsRaw.toString().trim().toUpperCase();
            feedback.style.display = "block"; nextBtn.style.display = "inline-block";

            if (u === c) {
                score++; feedback.innerHTML = "✅ CHÍNH XÁC!"; feedback.style.color = "var(--success-color)";
            } else {
                let txt = correctAnsRaw;
                if (currentType === "4Answer") txt = fullData[parseInt(correctAnsRaw)];
                if (currentType === "TFAnswer") txt = (c === 'T') ? "ĐÚNG" : "SAI";
                feedback.innerHTML = `❌ SAI RỒI!<br><span style="font-size:1rem; font-weight:normal; color:#333;">Đáp án đúng là: <b>${txt}</b></span>`;
                feedback.style.color = "var(--danger-color)";
            }
        }

        function nextQuestion() { currentIdx++; showQuestion(); }
        function endGame() { 
            document.getElementById('quiz-content').innerHTML = `<h2>HOÀN THÀNH!</h2><div style="font-size: 3.5rem; margin: 20px 0; color:var(--primary-color)">${score}/${currentGameData.length}</div><button class="btn-next" onclick="location.reload()">CHƠI LẠI</button>`; 
        }
        
        fetchGameList();
    </script>
</body>
</html>
